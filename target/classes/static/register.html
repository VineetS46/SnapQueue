<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SnapQueue – Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background: #f0f2f5; }
    .card { border: none; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    .brand-title { font-weight: 700; font-size: 1.6rem; color: #0d6efd; letter-spacing: -0.5px; }
    .brand-sub { font-size: .85rem; color: #6c757d; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 py-4">
  <div class="card p-4" style="width:100%;max-width:480px;">
    <div class="text-center mb-4">
      <div class="brand-title">📬 SnapQueue</div>
      <div class="brand-sub">Create your account</div>
    </div>

    <div id="alert" class="alert alert-danger d-none" role="alert"></div>

    <form id="registerForm">
      <div class="mb-3">
        <label class="form-label fw-semibold">Full Name</label>
        <input type="text" id="fullName" class="form-control" placeholder="John Doe" required/>
      </div>
      <div class="row g-3 mb-3">
        <div class="col">
          <label class="form-label fw-semibold">Employee ID</label>
          <input type="text" id="employeeId" class="form-control" placeholder="EMP001" required/>
        </div>
        <div class="col">
          <label class="form-label fw-semibold">Department</label>
          <input type="text" id="department" class="form-control" placeholder="Engineering" required/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <input type="email" id="email" class="form-control" placeholder="you@snapqueue.com" required/>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required/>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Confirm Password</label>
        <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required/>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Role</label>
        <select id="role" class="form-select" required>
          <option value="EMPLOYEE">Employee</option>
          <option value="MANAGER">Manager</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-semibold">Register</button>
    </form>

    <p class="text-center mt-3 mb-0 small">
      Already have an account? <a href="login.html">Login here</a>
    </p>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alertEl = document.getElementById('alert');
      alertEl.classList.add('d-none');

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        alertEl.textContent = 'Passwords do not match.';
        alertEl.classList.remove('d-none');
        return;
      }

      const payload = {
        fullName: document.getElementById('fullName').value.trim(),
        employeeId: document.getElementById('employeeId').value.trim(),
        department: document.getElementById('department').value.trim(),
        email: document.getElementById('email').value.trim(),
        password,
        role: document.getElementById('role').value
      };

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (res.status === 201) {
          window.location.href = 'login.html?registered=true';
        } else {
          const data = await res.json();
          alertEl.textContent = data.message || 'Registration failed. Please try again.';
          alertEl.classList.remove('d-none');
        }
      } catch {
        alertEl.textContent = 'Server error. Please try again.';
        alertEl.classList.remove('d-none');
      }
    });
  </script>
</body>
</html>
