<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SnapQueue</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background: #f0f2f5; }
    .brand-title { font-weight: 800; font-size: 1.6rem; color: #0d6efd; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
  <div class="text-center">
    <div class="brand-title mb-3">📬 SnapQueue</div>
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Redirecting...</span>
    </div>
    <p class="text-muted small mt-3">Redirecting to your dashboard...</p>
  </div>

  <script>
    (async () => {
      const res = await fetch('/api/auth/me');
      if (res.status === 401) { window.location.href = 'login.html'; return; }
      const emp = await res.json();
      const map = {
        EMPLOYEE: 'employee-dashboard.html',
        MANAGER:  'manager-dashboard.html',
        ADMIN:    'admin-dashboard.html'
      };
      window.location.href = map[emp.role] || 'login.html';
    })();
  </script>
</body>
</html>
