<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SnapQueue – Admin Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background: #f0f2f5; }
    .navbar { background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.07); }
    .brand-title { font-weight: 800; font-size: 1.25rem; color: #0d6efd; }
    .stat-card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.07); }
    .stat-number { font-size: 2rem; font-weight: 700; }
    .table-card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.07); }
  </style>
</head>
<body>

  <nav class="navbar px-4 py-3 mb-4">
    <span class="brand-title">📬 SnapQueue</span>
    <div class="ms-4 d-flex gap-3">
      <a href="admin-dashboard.html" class="nav-link fw-semibold text-primary">Admin Panel</a>
    </div>
    <div class="ms-auto d-flex align-items-center gap-3">
      <span id="userInfo" class="text-muted small fw-semibold"></span>
      <button class="btn btn-outline-danger btn-sm" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="container">
    <h5 class="fw-bold mb-4">Admin Panel</h5>

    <!-- Stat Cards -->
    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3">
        <div class="card stat-card p-3 text-center">
          <div class="text-muted small mb-1">Total</div>
          <div class="stat-number text-primary" id="cTotal">–</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card stat-card p-3 text-center">
          <div class="text-muted small mb-1">Approved</div>
          <div class="stat-number text-info" id="cApproved">–</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card stat-card p-3 text-center">
          <div class="text-muted small mb-1">Resolved</div>
          <div class="stat-number text-success" id="cResolved">–</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card stat-card p-3 text-center">
          <div class="text-muted small mb-1">Rejected</div>
          <div class="stat-number text-danger" id="cRejected">–</div>
        </div>
      </div>
    </div>

    <!-- Toggle Bar -->
    <div class="d-flex gap-2 mb-3">
      <button class="btn btn-primary btn-sm fw-semibold" id="btnApproved" onclick="switchView('approved')">Approved Issues</button>
      <button class="btn btn-outline-secondary btn-sm" id="btnAll" onclick="switchView('all')">All Issues</button>
    </div>

    <!-- Table -->
    <div class="card table-card p-3">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th style="width:140px;">Employee Name</th>
              <th style="width:90px;">Emp ID</th>
              <th>Message</th>
              <th style="width:130px;">Category</th>
              <th style="width:110px;">Status</th>
              <th style="width:120px;">Date</th>
              <th style="width:120px;">Action</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="7" class="text-center text-muted py-4">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const catBadge    = { BUG: 'danger', SUGGESTION: 'primary', APPRECIATION: 'success' };
    const catIcon     = { BUG: '🐛', SUGGESTION: '💡', APPRECIATION: '🌟' };
    const statusBadge = { PENDING: 'warning', APPROVED: 'info', REJECTED: 'danger', RESOLVED: 'success' };

    async function init() {
      const res = await fetch('/api/auth/me');
      if (res.status === 401) { window.location.href = 'login.html'; return; }
      const emp = await res.json();
      if (emp.role !== 'ADMIN') { window.location.href = 'login.html'; return; }
      document.getElementById('userInfo').textContent = `Admin Panel · ${emp.employeeId}`;
      await loadStats();
      await switchView('approved');
    }

    async function loadStats() {
      const res = await fetch('/api/feedback/all');
      const all = await res.json();
      document.getElementById('cTotal').textContent    = all.length;
      document.getElementById('cApproved').textContent = all.filter(f => f.status === 'APPROVED').length;
      document.getElementById('cResolved').textContent = all.filter(f => f.status === 'RESOLVED').length;
      document.getElementById('cRejected').textContent = all.filter(f => f.status === 'REJECTED').length;
    }

    async function switchView(view) {
      document.getElementById('btnApproved').className = view === 'approved'
        ? 'btn btn-primary btn-sm fw-semibold' : 'btn btn-outline-secondary btn-sm';
      document.getElementById('btnAll').className = view === 'all'
        ? 'btn btn-primary btn-sm fw-semibold' : 'btn btn-outline-secondary btn-sm';

      const url = view === 'approved' ? '/api/feedback/approved' : '/api/feedback/all';
      const res = await fetch(url);
      const feedbacks = await res.json();
      renderTable(feedbacks);
    }

    function renderTable(feedbacks) {
      const tbody = document.getElementById('tableBody');
      if (!feedbacks.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No issues found.</td></tr>';
        return;
      }
      tbody.innerHTML = feedbacks.map(f => `
        <tr id="row-${f.id}">
          <td class="fw-semibold small">${escHtml(f.submittedByName || '–')}</td>
          <td class="text-muted small">${escHtml(f.submittedBy || '–')}</td>
          <td>
            <div>${escHtml(f.message)}</div>
            ${f.rejectionReason
              ? `<div style="font-size:.75rem;color:#dc3545;font-style:italic;margin-top:2px;">Reason: ${escHtml(f.rejectionReason)}</div>`
              : ''}
          </td>
          <td><span class="badge bg-${catBadge[f.category]}">${catIcon[f.category]} ${f.category}</span></td>
          <td><span class="badge bg-${statusBadge[f.status]} ${f.status === 'PENDING' ? 'text-dark' : ''}" id="badge-${f.id}">${f.status}</span></td>
          <td class="text-muted small">${formatDate(f.createdAt)}</td>
          <td id="action-${f.id}">
            ${f.status === 'APPROVED'
              ? `<button class="btn btn-primary btn-sm" onclick="resolve(${f.id})">✓ Resolve</button>`
              : '<span class="text-muted small">–</span>'}
          </td>
        </tr>
      `).join('');
    }

    async function resolve(id) {
      const res = await fetch(`/api/feedback/${id}/resolve`, { method: 'PATCH' });
      if (res.ok) {
        document.getElementById(`badge-${id}`).outerHTML =
          `<span class="badge bg-success" id="badge-${id}">RESOLVED</span>`;
        document.getElementById(`action-${id}`).innerHTML = '<span class="text-muted small">–</span>';
        await loadStats();
      }
    }

    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      sessionStorage.clear();
      window.location.href = 'login.html';
    }

    function formatDate(dt) {
      if (!dt) return '–';
      return new Date(dt).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function escHtml(str) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(str));
      return d.innerHTML;
    }

    init();
  </script>
</body>
</html>
