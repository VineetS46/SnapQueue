<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SnapQueue – My Issues</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background: #f0f2f5; }
    .navbar { background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.07); }
    .brand-title { font-weight: 800; font-size: 1.25rem; color: #0d6efd; }
    .stat-card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.07); }
    .stat-number { font-size: 2rem; font-weight: 700; }
    .table-card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.07); }
    .rejection-reason { font-size: .78rem; color: #dc3545; font-style: italic; margin-top: 3px; }
  </style>
</head>
<body>

  <nav class="navbar px-4 py-3 mb-4">
    <span class="brand-title">📬 SnapQueue</span>
    <div class="ms-4 d-flex gap-3">
      <a href="employee-dashboard.html" class="nav-link fw-semibold text-primary">My Issues</a>
      <a href="submit.html" class="nav-link text-secondary">Submit Issue</a>
    </div>
    <div class="ms-auto d-flex align-items-center gap-3">
      <span id="userInfo" class="text-muted small fw-semibold"></span>
      <button class="btn btn-outline-danger btn-sm" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h5 class="fw-bold mb-0">My Issues</h5>
      <a href="submit.html" class="btn btn-primary btn-sm fw-semibold">+ Submit New Issue</a>
    </div>

    <!-- Stat Cards -->
    <div class="row g-3 mb-4">
      <div class="col-6 col-md">
        <div class="card stat-card p-3 text-center">
          <div class="text-muted small mb-1">Total</div>
          <div class="stat-number text-primary" id="cTotal">–</div>
        </div>
      </div>
      <div class="col-6 col-md">
        <div class="card stat-card p-3 text-center">
          <div class="text-muted small mb-1">Pending</div>
          <div class="stat-number text-warning" id="cPending">–</div>
        </div>
      </div>
      <div class="col-6 col-md">
        <div class="card stat-card p-3 text-center">
          <div class="text-muted small mb-1">Approved</div>
          <div class="stat-number text-info" id="cApproved">–</div>
        </div>
      </div>
      <div class="col-6 col-md">
        <div class="card stat-card p-3 text-center">
          <div class="text-muted small mb-1">Rejected</div>
          <div class="stat-number text-danger" id="cRejected">–</div>
        </div>
      </div>
      <div class="col-6 col-md">
        <div class="card stat-card p-3 text-center">
          <div class="text-muted small mb-1">Resolved</div>
          <div class="stat-number text-success" id="cResolved">–</div>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="card table-card p-3">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Message</th>
              <th style="width:130px;">Category</th>
              <th style="width:120px;">Status</th>
              <th style="width:140px;">Date Submitted</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="4" class="text-center text-muted py-4">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const catBadge    = { BUG: 'danger', SUGGESTION: 'primary', APPRECIATION: 'success' };
    const catIcon     = { BUG: '🐛', SUGGESTION: '💡', APPRECIATION: '🌟' };
    const statusBadge = { PENDING: 'warning', APPROVED: 'info', REJECTED: 'danger', RESOLVED: 'success' };

    async function init() {
      const res = await fetch('/api/auth/me');
      if (res.status === 401) { window.location.href = 'login.html'; return; }
      const emp = await res.json();
      if (emp.role !== 'EMPLOYEE') { window.location.href = 'login.html'; return; }

      document.getElementById('userInfo').textContent = `${emp.fullName} · ${emp.employeeId}`;

      const fbRes = await fetch('/api/feedback/my');
      const feedbacks = await fbRes.json();

      document.getElementById('cTotal').textContent    = feedbacks.length;
      document.getElementById('cPending').textContent  = feedbacks.filter(f => f.status === 'PENDING').length;
      document.getElementById('cApproved').textContent = feedbacks.filter(f => f.status === 'APPROVED').length;
      document.getElementById('cRejected').textContent = feedbacks.filter(f => f.status === 'REJECTED').length;
      document.getElementById('cResolved').textContent = feedbacks.filter(f => f.status === 'RESOLVED').length;

      const tbody = document.getElementById('tableBody');
      if (!feedbacks.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">No issues submitted yet.</td></tr>';
        return;
      }
      tbody.innerHTML = feedbacks.map(f => `
        <tr>
          <td>
            <div>${escHtml(f.message)}</div>
            ${f.status === 'REJECTED' && f.rejectionReason
              ? `<div class="rejection-reason">❌ Reason: ${escHtml(f.rejectionReason)}</div>`
              : ''}
          </td>
          <td><span class="badge bg-${catBadge[f.category]}">${catIcon[f.category]} ${f.category}</span></td>
          <td><span class="badge bg-${statusBadge[f.status]} ${f.status === 'PENDING' ? 'text-dark' : ''}">${f.status}</span></td>
          <td class="text-muted small">${formatDate(f.createdAt)}</td>
        </tr>
      `).join('');
    }

    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' });
      sessionStorage.clear();
      window.location.href = 'login.html';
    }

    function formatDate(dt) {
      if (!dt) return '–';
      return new Date(dt).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function escHtml(str) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(str));
      return d.innerHTML;
    }

    init();
  </script>
</body>
</html>
